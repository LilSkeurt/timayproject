<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atelier Vitrine — Bienvenue</title>
  <meta name="description" content="Atelier Vitrine, sites internet premium. Entrez dans l'expérience.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body class="welcome-gate">
  <button type="button" class="welcome-stage" id="welcome-stage" data-welcome-stage data-welcome-required="5"
    aria-label="Toucher le cœur lumineux pour entrer sur le site">
    <canvas id="welcome-logo" aria-hidden="true"></canvas>
    <span class="welcome-fallback" data-welcome-fallback aria-hidden="true">AV</span>
  </button>

  <div class="welcome-overlay">
    <div class="welcome-header">
      <p class="welcome-eyebrow">Atelier Vitrine</p>
      <h1 class="welcome-title">Bienvenue.</h1>
      <p class="welcome-subtitle">
        Faites tourner le cœur lumineux avec la souris, puis touchez-le pour ouvrir le passage vers votre site.
      </p>
    </div>

    <div class="welcome-footer">
      <div class="welcome-progress" aria-hidden="true">
        <svg class="welcome-ring" viewBox="0 0 120 120">
          <circle class="welcome-ring-track" cx="60" cy="60" r="54"></circle>
          <circle class="welcome-ring-progress" data-welcome-ring cx="60" cy="60" r="54"></circle>
        </svg>
        <span class="welcome-progress-count" data-welcome-count>0<u>/</u>5</span>
      </div>
      <p class="welcome-hint" data-welcome-hint role="status" aria-live="polite">Touchez le cœur lumineux</p>
      <a class="welcome-skip" href="site.html">Passer l'intro →</a>
    </div>
  </div>

  <div class="welcome-portal" data-welcome-portal aria-hidden="true"></div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="welcome-gate.js"></script>
</body>

</html>
